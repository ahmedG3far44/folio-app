name: Deploy to Development (Self-Hosted)

on:
  push:
    branches: [ "development" ]

jobs:
  deploy:
    runs-on: self-hosted
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Debug - Show directory structure
      run: ls -la

    - name: Remove unused files
      run: |
        rm -fr README.md frontend 'showcase(1).gif'
    - name: Install server dependencies
      run: |
        cd server
        npm install

    - name: Stop any existing server
      run: |
        pm2 stop folio-server || true
        pm2 delete folio-server || true

    - name: Start server with PM2
      run: |
        cd server
        pm2 start --name "folio-server" "npm start" --watch
        pm2 save
      env:
        PORT: 8000
        ENV: production
        AWS_S3_ACCESS_KEY: ${{ secrets.AWS_S3_ACCESS_KEY }}
        AWS_S3_ACCESS_SECRETE_KEY: ${{ secrets.AWS_S3_ACCESS_SECRETE_KEY }}
        AWS_S3_REGION: ${{ secrets.AWS_S3_REGION }}
        AWS_S3_BUCKET_NAME: ${{ secrets.AWS_S3_BUCKET_NAME }}
        AWS_S3_BUCKET_DOMAIN: ${{ secrets.AWS_S3_BUCKET_DOMAIN }}
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
        SSL_CERT: ${{ secrets.SSL_CERT }}
        SSL_KEY: ${{ secrets.SSL_KEY }}
    - name: Setup PM2 startup (manual step - run once on server)
      if: false  # This step is disabled by default
      run: |
        sudo env PATH=$PATH:/usr/bin /usr/local/lib/node_modules/pm2/bin/pm2 startup systemd -u folio --hp /home/folio
        pm2 save